name: CI — Build, Lint, Test, Security

on:
  push:
    branches: [main, cdk-and-docs-update]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  AWS_REGION: us-east-1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff check
        run: ruff check agent/ gateway/ ingest/ cdk/custom_resources/ ui/

      - name: Ruff format check
        run: ruff format --check agent/ gateway/ ingest/ cdk/custom_resources/ ui/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: mypy
        run: |
          mypy agent/ gateway/ ingest/ cdk/custom_resources/ \
            --ignore-missing-imports \
            --no-error-summary || true

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Bandit scan
        run: |
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f json -o bandit-report.json \
            --severity-level medium \
            --exit-zero

      - name: Bandit summary (high severity fails the build)
        run: |
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f txt --severity-level high

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        env:
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          CLIMATE_RAG_BUCKET: test-bucket
          CLIMATE_RAG_MEMORY_ID: test-memory-id
          CLIMATE_RAG_CODE_INTERPRETER_ID: test-ci-id
          CHUNK_OUTPUT_DIR: /tmp/chunks
        run: |
          python -m pytest tests/unit -v \
            --cov=agent \
            --cov=ingest \
            --cov=gateway \
            --cov=cdk/custom_resources \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=78

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  retrieval-regression:
    name: Retrieval Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify committed index and chunks are present
        run: |
          # The FAISS index and embedded chunks must be committed to the repo.
          # If missing, the retrieval gate cannot run — fail loudly so the gap is visible.
          missing=0

          if [ ! -f "data/chunks/index/faiss.index" ]; then
            echo "❌ Missing: data/chunks/index/faiss.index (commit the index file)"
            missing=1
          fi

          if [ ! -f "data/chunks/index/metadata.jsonl" ]; then
            echo "❌ Missing: data/chunks/index/metadata.jsonl (commit the metadata file)"
            missing=1
          fi

          if ! ls data/chunks/embedded/*_chunks.jsonl 1>/dev/null 2>&1; then
            echo "❌ Missing: data/chunks/embedded/*_chunks.jsonl (commit embedded chunks)"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Run locally to regenerate:"
            echo "  python ingest/build_index.py  # or equivalent"
            echo "Then commit: data/chunks/index/ and data/chunks/embedded/"
            exit 1
          fi

          echo "✅ FAISS index, metadata, and embedded chunks all present"

      - name: Run retrieval eval
        env:
          AWS_REGION: us-east-1
          CHUNK_OUTPUT_DIR: data/chunks
          CLIMATE_RAG_BUCKET: ""
          AWS_PROFILE: ""
        run: |
          python eval/run.py --suite retrieval --top-k 5
          echo "✅ Retrieval eval complete — check results in eval/results/"

  cdk-synth:
    name: CDK Synth (Template Validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g aws-cdk

      - name: CDK synth
        working-directory: cdk
        run: |
          cdk synth --quiet 2>&1 || echo "CDK synth requires AWS context — validation only"
