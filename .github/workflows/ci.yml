name: CI — Build, Lint, Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit mypy ruff

      - name: Lint (ruff)
        run: |
          ruff check agent/ gateway/ ingest/ cdk/custom_resources/
          ruff format --check agent/ gateway/ ingest/ cdk/custom_resources/

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit -v \
            --cov=agent \
            --cov=ingest \
            --cov=gateway \
            --cov=cdk/custom_resources \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Security scan (bandit)
        run: |
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f json -o bandit-report.json \
            --severity-level medium \
            --exit-zero
          # Print summary to logs
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f txt --severity-level high

      - name: Type check (mypy)
        run: |
          mypy agent/ gateway/ ingest/ cdk/custom_resources/ \
            --ignore-missing-imports \
            --no-error-summary || true

      - name: CDK synth (validate templates)
        run: |
          npm install -g aws-cdk
          cd cdk && cdk synth --quiet 2>&1 || echo "CDK synth requires AWS context — skipped in CI"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
