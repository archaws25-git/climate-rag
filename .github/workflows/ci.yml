name: CI — Build, Lint, Test, Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  AWS_REGION: us-east-1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff flake8

      - name: Ruff check
        run: ruff check agent/ gateway/ ingest/ cdk/custom_resources/ ui/

      - name: Ruff format check
        run: ruff format --check agent/ gateway/ ingest/ cdk/custom_resources/ ui/

      - name: Flake8
        run: flake8 agent/ gateway/ ingest/ cdk/custom_resources/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: mypy
        run: |
          mypy agent/ gateway/ ingest/ cdk/custom_resources/ \
            --ignore-missing-imports \
            --no-error-summary || true

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Bandit scan
        run: |
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f json -o bandit-report.json \
            --severity-level medium \
            --exit-zero

      - name: Bandit summary (high severity fails the build)
        run: |
          bandit -r agent/ gateway/ ingest/ cdk/custom_resources/ \
            -f txt --severity-level high

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        env:
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          CLIMATE_RAG_BUCKET: test-bucket
          CLIMATE_RAG_MEMORY_ID: test-memory-id
          CLIMATE_RAG_CODE_INTERPRETER_ID: test-ci-id
          CHUNK_OUTPUT_DIR: /tmp/chunks
        run: |
          python -m pytest tests/unit -v \
            --cov=agent \
            --cov=ingest \
            --cov=gateway \
            --cov=cdk/custom_resources \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  cdk-synth:
    name: CDK Synth (Template Validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g aws-cdk

      - name: CDK synth
        working-directory: cdk
        run: |
          cdk synth --quiet 2>&1 || echo "CDK synth requires AWS context — validation only"
